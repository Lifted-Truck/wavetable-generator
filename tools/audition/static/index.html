<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>wtfoundry · audition</title>
<style>
  :root {
    --bg: #14161c; --panel: #1d2027; --panel2: #252934; --line: #333845;
    --fg: #e7e9ee; --dim: #98a0b0; --accent: #6ea8fe; --warn: #f0a35e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 13px/1.5 ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .3px; }
  header .hint { color: var(--dim); font-size: 12px; }
  .layout { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 49px); }
  .sidebar { border-right: 1px solid var(--line); overflow-y: auto; }
  .fam { padding: 6px 14px; color: var(--accent); font-weight: 600; font-size: 11px;
         text-transform: uppercase; letter-spacing: .6px; position: sticky; top: 0;
         background: var(--bg); border-bottom: 1px solid var(--line); }
  .row { padding: 8px 14px; border-bottom: 1px solid #23262f; cursor: pointer; display: flex;
         justify-content: space-between; gap: 8px; }
  .row:hover { background: var(--panel2); }
  .row.sel { background: #2b3346; }
  .row .nm { font-variant-numeric: tabular-nums; }
  .row .meta { color: var(--dim); font-size: 11px; white-space: nowrap; }
  .row.suspect .nm::after { content: " ●"; color: var(--warn); }
  .main { padding: 18px 22px; overflow-y: auto; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
          padding: 16px; margin-bottom: 16px; }
  .controls { display: flex; flex-wrap: wrap; gap: 18px; align-items: center; }
  .ctl { display: flex; flex-direction: column; gap: 4px; }
  .ctl label { color: var(--dim); font-size: 11px; }
  input[type=range] { width: 220px; }
  button {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
    border-radius: 7px; padding: 7px 12px; cursor: pointer; font: inherit;
  }
  button:hover { border-color: var(--accent); }
  button.on { background: var(--accent); color: #0c0f16; border-color: var(--accent); }
  .kbd { display: flex; gap: 2px; margin-top: 14px; user-select: none; height: 120px; }
  .key { width: 38px; border: 1px solid var(--line); border-top: none; border-radius: 0 0 6px 6px;
         background: #f3f5f9; color: #222; display: flex; align-items: flex-end;
         justify-content: center; padding-bottom: 6px; cursor: pointer; position: relative; }
  .key.black { background: #2a2e38; color: #cdd3df; height: 72px; width: 26px; margin: 0 -14px; z-index: 2; }
  .key.down { background: var(--accent); color: #0c0f16; }
  .spectro img { max-width: 100%; border-radius: 8px; display: block; }
  .feat { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px 18px; }
  .feat div { display: flex; justify-content: space-between; border-bottom: 1px dotted #2c313c; padding: 2px 0; }
  .feat span { color: var(--dim); }
  .title { font-size: 15px; font-weight: 600; margin: 0 0 2px; }
  .sub { color: var(--dim); margin: 0 0 12px; font-family: ui-monospace, monospace; font-size: 12px; }
  .note { color: var(--warn); }
  code { background: #0e1016; padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>wtfoundry · audition</h1>
  <button id="enable">▶ enable audio</button>
  <button id="drone">drone: off</button>
  <div class="ctl" style="flex-direction:row;align-items:center;gap:8px">
    <label>octave</label><button id="octdn">–</button><span id="oct">3</span><button id="octup">+</button>
  </div>
  <div class="ctl" style="flex-direction:row;align-items:center;gap:8px">
    <label>vol</label><input id="vol" type="range" min="0" max="1" step="0.01" value="0.5" style="width:120px">
  </div>
  <span class="hint">click a table → hold a key (A W S E D F T G Y H U J K) or the on-screen keys · scrub <b>morph</b> while a note sustains</span>
</header>

<div class="layout">
  <div class="sidebar" id="list">loading catalog…</div>
  <div class="main">
    <div class="card">
      <p class="title" id="selName">no table selected</p>
      <p class="sub" id="selParams"></p>
      <div class="controls">
        <div class="ctl">
          <label>morph position · <span id="morphLabel">0 / 0</span></label>
          <input id="morph" type="range" min="0" max="0" step="1" value="0" />
        </div>
        <div class="ctl">
          <label>status</label>
          <span id="status" class="note">audio not enabled</span>
        </div>
      </div>
      <div class="kbd" id="kbd"></div>
    </div>

    <div class="card spectro">
      <p class="title">morph spectrogram</p>
      <img id="spectro" alt="select a table" />
    </div>

    <div class="card">
      <p class="title">features</p>
      <div class="feat" id="feat"></div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
